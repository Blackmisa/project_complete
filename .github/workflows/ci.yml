name: Datathon CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'evaluation/**'
      - 'pyproject.toml'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'evaluation/**'
      - 'pyproject.toml'

jobs:
  quality:
    name: Lint + Tipos + Testes
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests evaluation

      - name: Format check (ruff)
        run: ruff format --check src tests evaluation

      - name: Type check (mypy)
        run: mypy src --ignore-missing-imports

      - name: Security scan (bandit)
        run: bandit -r src -c pyproject.toml -ll

      - name: Tests + coverage
        run: |
          pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            --junitxml=test-results.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            test-results.xml
