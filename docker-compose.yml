services:
  # Vector store para RAG
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: datathon-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MLflow tracking server (sqlite + filesystem para artefatos = simples)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: datathon-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlruns
      - mlflow_artifacts:/mlartifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root /mlartifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Postgres compartilhado pelo Langfuse
  langfuse-db:
    image: postgres:16-alpine
    container_name: datathon-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Langfuse — observability/tracing para LLM (cobre o requisito de telemetria)
  langfuse:
    image: langfuse/langfuse:2
    container_name: datathon-langfuse
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: troque-para-um-segredo-real-em-prod
      SALT: troque-para-um-salt-real-em-prod
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "true"
      LANGFUSE_INIT_ORG_ID: datathon
      LANGFUSE_INIT_PROJECT_ID: fase05
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-datathon-public
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-datathon-secret
      LANGFUSE_INIT_USER_EMAIL: admin@datathon.local
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: datathon123

volumes:
  qdrant_data:
  mlflow_data:
  mlflow_artifacts:
  langfuse_db_data:
